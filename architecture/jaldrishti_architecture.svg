<svg viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1100" height="620" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e3a5f">JalDrishti — Architecture Diagram (IBM Cloud Lite)</text>
  <text x="550" y="56" text-anchor="middle" font-size="11" fill="#64748b">AI Kosh MIS 78th Round → IBM Cloud Services → End Users</text>
  
  <!-- Lane backgrounds -->
  <!-- Layer 1: Data Source -->
  <rect x="10" y="70" width="155" height="520" rx="8" fill="#e8f4fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="87" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">DATA SOURCE</text>
  
  <!-- Layer 2: Storage -->
  <rect x="175" y="70" width="165" height="520" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="258" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">STORAGE LAYER</text>
  
  <!-- Layer 3: Analytics -->
  <rect x="350" y="70" width="185" height="520" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5"/>
  <text x="443" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">ANALYTICS &amp; ML</text>
  
  <!-- Layer 4: API -->
  <rect x="545" y="70" width="165" height="520" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="628" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#6a1b9a">API LAYER</text>
  
  <!-- Layer 5: Serving -->
  <rect x="720" y="70" width="185" height="260" rx="8" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.5"/>
  <text x="813" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#880e4f">CHATBOT</text>
  
  <!-- Layer 6: Dashboard -->
  <rect x="720" y="340" width="185" height="250" rx="8" fill="#e0f7fa" stroke="#80deea" stroke-width="1.5"/>
  <text x="813" y="358" text-anchor="middle" font-size="10" font-weight="bold" fill="#006064">DASHBOARD</text>
  
  <!-- End Users -->
  <rect x="915" y="70" width="170" height="520" rx="8" fill="#f1f8e9" stroke="#aed581" stroke-width="1.5"/>
  <text x="1000" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#33691e">END USERS</text>

  <!-- ── Data Source Boxes ── -->
  <!-- AI Kosh -->
  <rect x="22" y="110" width="131" height="70" rx="6" fill="#1565c0" stroke="none"/>
  <text x="87" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="white">AI Kosh</text>
  <text x="87" y="150" text-anchor="middle" font-size="9" fill="#bbdefb">MIS 78th Round</text>
  <text x="87" y="164" text-anchor="middle" font-size="9" fill="#bbdefb">CSV / Excel</text>
  
  <!-- Indicators box -->
  <rect x="22" y="198" width="131" height="110" rx="6" fill="#white" stroke="#90caf9" stroke-width="1.5" fill="white"/>
  <text x="87" y="216" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">Indicators</text>
  <text x="87" y="232" text-anchor="middle" font-size="8" fill="#374151">• Improved Water %</text>
  <text x="87" y="246" text-anchor="middle" font-size="8" fill="#374151">• Rural / Urban</text>
  <text x="87" y="260" text-anchor="middle" font-size="8" fill="#374151">• Social Groups</text>
  <text x="87" y="274" text-anchor="middle" font-size="8" fill="#374151">• Clean Cooking Fuel</text>
  <text x="87" y="288" text-anchor="middle" font-size="8" fill="#374151">• Migration Rate</text>

  <!-- ── Storage Layer ── -->
  <!-- COS -->
  <rect x="186" y="110" width="143" height="80" rx="6" fill="#2e7d32" stroke="none"/>
  <text x="258" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Cloud Object Storage</text>
  <text x="258" y="150" text-anchor="middle" font-size="9" fill="#c8e6c9">Lite: 25 GB free</text>
  <text x="258" y="164" text-anchor="middle" font-size="9" fill="#c8e6c9">Raw + Cleaned CSVs</text>
  <text x="258" y="178" text-anchor="middle" font-size="9" fill="#c8e6c9">jaldrishti-raw-data</text>
  
  <!-- Db2 -->
  <rect x="186" y="206" width="143" height="80" rx="6" fill="#388e3c" stroke="none"/>
  <text x="258" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Db2 on Cloud</text>
  <text x="258" y="244" text-anchor="middle" font-size="9" fill="#c8e6c9">Lite: 200 MB</text>
  <text x="258" y="258" text-anchor="middle" font-size="9" fill="#c8e6c9">STATE_WATER_METRICS</text>
  <text x="258" y="272" text-anchor="middle" font-size="9" fill="#c8e6c9">SQL Analytics</text>

  <!-- ── Analytics Layer ── -->
  <!-- Watson Studio -->
  <rect x="362" y="110" width="160" height="80" rx="6" fill="#e65100" stroke="none"/>
  <text x="442" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Watson Studio</text>
  <text x="442" y="148" text-anchor="middle" font-size="9" fill="#ffe0b2">Lite: 50 CU/month</text>
  <text x="442" y="162" text-anchor="middle" font-size="9" fill="#ffe0b2">ETL Notebook</text>
  <text x="442" y="176" text-anchor="middle" font-size="9" fill="#ffe0b2">Pandas + ibm_db ETL</text>
  
  <!-- Watson ML -->
  <rect x="362" y="206" width="160" height="100" rx="6" fill="#bf360c" stroke="none"/>
  <text x="442" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Watson ML</text>
  <text x="442" y="244" text-anchor="middle" font-size="9" fill="#ffe0b2">Lite: 20 deployments</text>
  <text x="442" y="260" text-anchor="middle" font-size="9" fill="#ffccbc">• SDG Risk Classifier (GBT)</text>
  <text x="442" y="274" text-anchor="middle" font-size="9" fill="#ffccbc">• Equity-Tier KMeans</text>
  <text x="442" y="288" text-anchor="middle" font-size="9" fill="#ffccbc">• Rural Regressor (Ridge)</text>
  
  <!-- Node-RED -->
  <rect x="362" y="320" width="160" height="70" rx="6" fill="#f57c00" stroke="none"/>
  <text x="442" y="344" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Node-RED</text>
  <text x="442" y="360" text-anchor="middle" font-size="9" fill="#ffe0b2">Cloud Foundry Lite</text>
  <text x="442" y="374" text-anchor="middle" font-size="9" fill="#ffe0b2">Data refresh flows</text>

  <!-- ── API Layer ── -->
  <!-- Cloud Functions -->
  <rect x="557" y="110" width="141" height="130" rx="6" fill="#6a1b9a" stroke="none"/>
  <text x="628" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Cloud Functions</text>
  <text x="628" y="148" text-anchor="middle" font-size="9" fill="#e1bee7">Lite: 5M invocations</text>
  <text x="628" y="166" text-anchor="middle" font-size="8" fill="#ce93d8">/getStateStats</text>
  <text x="628" y="180" text-anchor="middle" font-size="8" fill="#ce93d8">/listPriorityStates</text>
  <text x="628" y="194" text-anchor="middle" font-size="8" fill="#ce93d8">/getPrediction</text>
  <text x="628" y="208" text-anchor="middle" font-size="8" fill="#ce93d8">/getNLQuery</text>
  <text x="628" y="226" text-anchor="middle" font-size="8" fill="#e1bee7">Web Actions (REST)</text>

  <!-- ── Chatbot ── -->
  <!-- Watson Assistant -->
  <rect x="731" y="108" width="163" height="110" rx="6" fill="#880e4f" stroke="none"/>
  <text x="812" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Watson Assistant</text>
  <text x="812" y="146" text-anchor="middle" font-size="9" fill="#f8bbd0">Lite: 10K msgs/month</text>
  <text x="812" y="162" text-anchor="middle" font-size="9" fill="#f8bbd0">JalMitra Chatbot</text>
  <text x="812" y="178" text-anchor="middle" font-size="8" fill="#f48fb1">8 intents, 27 states</text>
  <text x="812" y="192" text-anchor="middle" font-size="8" fill="#f48fb1">NLU + Dialog Flow</text>

  <!-- ── Dashboard ── -->
  <rect x="731" y="370" width="163" height="110" rx="6" fill="#006064" stroke="none"/>
  <text x="812" y="394" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Cloud Foundry</text>
  <text x="812" y="410" text-anchor="middle" font-size="9" fill="#b2ebf2">Lite: 256 MB RAM</text>
  <text x="812" y="426" text-anchor="middle" font-size="9" fill="#b2ebf2">JalDrishti Dashboard</text>
  <text x="812" y="442" text-anchor="middle" font-size="8" fill="#80cbc4">Chart.js + Leaflet</text>
  <text x="812" y="456" text-anchor="middle" font-size="8" fill="#80cbc4">Choropleth + Charts</text>

  <!-- ── End Users ── -->
  <!-- Citizens -->
  <rect x="926" y="108" width="148" height="65" rx="6" fill="#558b2f" stroke="none"/>
  <text x="1000" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Citizens &amp; Panchayat</text>
  <text x="1000" y="146" text-anchor="middle" font-size="9" fill="#dcedc8">JalMitra chatbot</text>
  <text x="1000" y="160" text-anchor="middle" font-size="9" fill="#dcedc8">NL water queries</text>
  
  <!-- NGOs -->
  <rect x="926" y="188" width="148" height="65" rx="6" fill="#689f38" stroke="none"/>
  <text x="1000" y="210" text-anchor="middle" font-size="10" font-weight="bold" fill="white">NGOs &amp; Researchers</text>
  <text x="1000" y="226" text-anchor="middle" font-size="9" fill="#dcedc8">Dashboard + API</text>
  <text x="1000" y="240" text-anchor="middle" font-size="9" fill="#dcedc8">Analytics reports</text>
  
  <!-- Policymakers -->
  <rect x="926" y="268" width="148" height="65" rx="6" fill="#7cb342" stroke="none"/>
  <text x="1000" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Policymakers</text>
  <text x="1000" y="306" text-anchor="middle" font-size="9" fill="#dcedc8">SDG dashboard</text>
  <text x="1000" y="320" text-anchor="middle" font-size="9" fill="#dcedc8">Priority states view</text>
  
  <!-- JJM -->
  <rect x="926" y="348" width="148" height="65" rx="6" fill="#8bc34a" stroke="none"/>
  <text x="1000" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Jal Jeevan Mission</text>
  <text x="1000" y="386" text-anchor="middle" font-size="9" fill="#dcedc8">Program analytics</text>
  <text x="1000" y="400" text-anchor="middle" font-size="9" fill="#dcedc8">Fund allocation</text>

  <!-- ── Flow Arrows ── -->
  <!-- AI Kosh → COS -->
  <line x1="153" y1="148" x2="186" y2="148" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  
  <!-- COS → Watson Studio -->
  <line x1="329" y1="148" x2="362" y2="148" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Watson Studio → Db2 (ETL load) -->
  <path d="M442 190 L442 220 L329 240 L329 210" stroke="#e65100" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)" stroke-dasharray="5,3"/>
  
  <!-- Db2 → Cloud Functions -->
  <line x1="329" y1="248" x2="557" y2="185" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowPurple)"/>
  
  <!-- Watson Studio → WML -->
  <line x1="442" y1="190" x2="442" y2="206" stroke="#e65100" stroke-width="2" marker-end="url(#arrowOrange)"/>
  
  <!-- WML → Cloud Functions -->
  <line x1="522" y1="248" x2="557" y2="200" stroke="#bf360c" stroke-width="2" marker-end="url(#arrowPurple)"/>
  
  <!-- Node-RED → Cloud Functions -->
  <line x1="522" y1="355" x2="557" y2="240" stroke="#f57c00" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  
  <!-- Cloud Functions → Watson Assistant -->
  <line x1="698" y1="165" x2="731" y2="165" stroke="#6a1b9a" stroke-width="2" marker-end="url(#arrowPink)"/>
  
  <!-- Cloud Functions → Dashboard -->
  <line x1="628" y1="240" x2="628" y2="425" stroke="#6a1b9a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="628" y1="425" x2="731" y2="425" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  
  <!-- Watson Assistant → Users -->
  <line x1="894" y1="165" x2="926" y2="148" stroke="#880e4f" stroke-width="2" marker-end="url(#arrowUser)"/>
  
  <!-- Dashboard → Users -->
  <line x1="894" y1="425" x2="926" y2="380" stroke="#006064" stroke-width="2" marker-end="url(#arrowUser)"/>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#1565c0"/></marker>
    <marker id="arrowGreen"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2e7d32"/></marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e65100"/></marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#6a1b9a"/></marker>
    <marker id="arrowPink"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#880e4f"/></marker>
    <marker id="arrowTeal"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#006064"/></marker>
    <marker id="arrowUser"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#33691e"/></marker>
  </defs>
  
  <!-- Legend -->
  <rect x="22" y="530" width="1056" height="46" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="548" font-size="9" fill="#374151">Legend:</text>
  <line x1="85" y1="545" x2="110" y2="545" stroke="#1565c0" stroke-width="2"/>
  <text x="115" y="548" font-size="9" fill="#374151">Data flow</text>
  <line x1="175" y1="545" x2="200" y2="545" stroke="#6a1b9a" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="205" y="548" font-size="9" fill="#374151">Control/trigger</text>
  <rect x="290" y="539" width="12" height="12" rx="2" fill="#2e7d32"/>
  <text x="308" y="548" font-size="9" fill="#374151">Storage</text>
  <rect x="370" y="539" width="12" height="12" rx="2" fill="#e65100"/>
  <text x="388" y="548" font-size="9" fill="#374151">Analytics/ML</text>
  <rect x="465" y="539" width="12" height="12" rx="2" fill="#6a1b9a"/>
  <text x="483" y="548" font-size="9" fill="#374151">API</text>
  <rect x="510" y="539" width="12" height="12" rx="2" fill="#880e4f"/>
  <text x="528" y="548" font-size="9" fill="#374151">Chatbot</text>
  <rect x="585" y="539" width="12" height="12" rx="2" fill="#006064"/>
  <text x="603" y="548" font-size="9" fill="#374151">Dashboard</text>
  <text x="680" y="548" font-size="9" fill="#64748b">All services: IBM Cloud Lite (free tier) | Dataset: MIS 78th Round, AI Kosh | SDG 6 Monitoring Platform</text>

  <!-- Label flow steps -->
  <text x="167" y="142" font-size="8" fill="#1565c0" transform="rotate(-10,167,142)">Upload</text>
  <text x="337" y="142" font-size="8" fill="#2e7d32" transform="rotate(-5,337,142)">Load</text>
</svg>
